<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>TICKER - Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "surface": "#0f1a37",
                "on-secondary-container": "#b6d4ff",
                "on-tertiary-fixed-variant": "#7d8fba",
                "secondary-fixed": "#d9e8ff",
                "surface-container-lowest": "#09102a",
                "on-primary-fixed": "#dfe7ff",
                "surface-container-highest": "#24315d",
                "on-secondary": "#dcecff",
                "error": "#ff93b3",
                "on-tertiary-container": "#aab8d6",
                "on-primary": "#eef5ff",
                "surface-container-high": "#1a274f",
                "on-error-container": "#ffd8e5",
                "inverse-on-surface": "#dbe5ff",
                "on-surface": "#f5f8ff",
                "surface-container-low": "#121d40",
                "secondary-container": "#2b4b9f",
                "secondary-fixed-dim": "#9fbcff",
                "surface-container": "#18284b",
                "inverse-surface": "#f8fbff",
                "background": "#070e1f",
                "on-secondary-fixed-variant": "#7aa5ff",
                "on-primary-container": "#c9dcff",
                "tertiary-fixed-dim": "#d4dff6",
                "tertiary-container": "#8f9fca",
                "surface-variant": "#2b3b72",
                "outline-variant": "#7e98dd",
                "error-container": "#ff578a",
                "primary-fixed": "#c7d5ff",
                "surface-tint": "#4f7dff",
                "on-surface-variant": "#c3d0ef",
                "on-error": "#5c1429",
                "on-background": "#e7f0ff",
                "secondary": "#8cb8ff",
                "on-tertiary": "#bcc5e2",
                "tertiary-fixed": "#d9e0f2",
                "primary-container": "#5c78ff",
                "surface-bright": "#33477e",
                "on-secondary-fixed": "#121f3d",
                "surface-dim": "#071021",
                "primary-fixed-dim": "#95adff",
                "primary": "#5e7dff",
                "outline": "#97a9f8",
                "tertiary": "#c7d0eb",
                "on-tertiary-fixed": "#1f2346",
                "on-primary-fixed-variant": "#acc0ff",
                "inverse-primary": "#8499ff"
            },
            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            "spacing": {
                "margin-desktop": "40px",
                "stack-md": "24px",
                "gutter": "20px",
                "stack-xl": "80px",
                "margin-mobile": "16px",
                "container-max": "1200px",
                "stack-lg": "48px"
            },
            "fontFamily": {
                "display-mobile": ["Inter"],
                "body-lg": ["Inter"],
                "display-lg": ["Inter"],
                "label-caps": ["Space Grotesk"],
                "headline-lg": ["Inter"],
                "body-md": ["Inter"],
                "headline-sm": ["Inter"]
            },
            "fontSize": {
                "display-mobile": ["64px", {"lineHeight": "110%", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                "display-lg": ["120px", {"lineHeight": "110%", "letterSpacing": "-0.04em", "fontWeight": "700"}],
                "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "500"}],
                "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                "headline-sm": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
</head>
<body class="bg-background text-on-background font-body-md text-body-md overflow-x-hidden selection:bg-primary/30">

    <div class="view-transition" id="dashboard-view">
        <header class="bg-background/80 backdrop-blur-md flex items-center justify-center w-full px-margin-mobile md:px-margin-desktop py-4 sticky top-0 z-40">
            <div class="flex items-center gap-4">
                <h1 class="font-label-caps text-label-caps tracking-[0.2em] text-primary">TICKER</h1>
            </div>
        </header>

        <main class="w-full max-w-screen-xl mx-auto px-4 sm:px-6 md:px-8 pb-24 sm:pb-32">
            <section class="mt-stack-md md:mt-stack-lg flex flex-col items-center">
                <div class="w-full max-w-full sm:max-w-4xl p-5 sm:p-8 md:p-10 lg:p-stack-lg glass-card rounded-2xl sm:rounded-3xl active-glow text-center transition-all duration-500" id="hero-countdown-container">
                    <div class="mb-5 sm:mb-6">
                        <span class="font-label-caps text-[10px] text-primary px-3 py-1 bg-primary/10 rounded-full tracking-[0.15em] uppercase">Active Focus</span>
                    </div>
                    <h2 class="font-headline-lg text-2xl sm:text-3xl md:text-headline-lg text-on-surface mb-2" id="hero-title">Product Launch</h2>
                    <p class="font-body-md text-sm sm:text-base text-on-surface-variant mb-6 sm:mb-8 md:mb-10" id="hero-description">The next evolution of Ticker begins.</p>
                    <div class="flex flex-wrap justify-center items-center gap-2 sm:gap-3 md:gap-8 ticker-text" id="hero-ticker">
                        <div class="flex flex-col items-center min-w-[52px] sm:min-w-[64px]">
                            <span class="font-display-lg text-[32px] sm:text-[40px] md:text-[64px] leading-none text-on-surface" id="hero-days">00</span>
                            <span class="font-label-caps text-[9px] sm:text-[10px] text-on-surface-variant uppercase mt-2">Days</span>
                        </div>
                        <span class="font-display-lg text-[32px] sm:text-[40px] md:text-[64px] leading-none text-primary/40 -mt-3 sm:-mt-4 md:-mt-6">:</span>
                        <div class="flex flex-col items-center min-w-[52px] sm:min-w-[64px]">
                            <span class="font-display-lg text-[32px] sm:text-[40px] md:text-[64px] leading-none text-on-surface" id="hero-hours">00</span>
                            <span class="font-label-caps text-[9px] sm:text-[10px] text-on-surface-variant uppercase mt-2">Hours</span>
                        </div>
                        <span class="font-display-lg text-[32px] sm:text-[40px] md:text-[64px] leading-none text-primary/40 -mt-3 sm:-mt-4 md:-mt-6">:</span>
                        <div class="flex flex-col items-center min-w-[52px] sm:min-w-[64px]">
                            <span class="font-display-lg text-[32px] sm:text-[40px] md:text-[64px] leading-none text-on-surface" id="hero-mins">00</span>
                            <span class="font-label-caps text-[9px] sm:text-[10px] text-on-surface-variant uppercase mt-2">Mins</span>
                        </div>
                        <span class="font-display-lg text-[32px] sm:text-[40px] md:text-[64px] leading-none text-primary/40 -mt-3 sm:-mt-4 md:-mt-6">:</span>
                        <div class="flex flex-col items-center min-w-[52px] sm:min-w-[64px]">
                            <span class="font-display-lg text-[32px] sm:text-[40px] md:text-[64px] leading-none text-primary" id="hero-secs">00</span>
                            <span class="font-label-caps text-[9px] sm:text-[10px] text-primary uppercase mt-2">Secs</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="mt-stack-xl">
                <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-stack-md">
                    <h3 class="font-headline-sm text-xl sm:text-headline-sm text-on-surface">My Events</h3>
                    <button class="font-label-caps text-label-caps text-on-surface-variant flex items-center gap-2 hover:text-primary transition-colors self-start sm:self-auto">
                        VIEW ALL <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
                    </button>
                </div>
                <div class="flex flex-col gap-3" id="events-list-container">
                    </div>
            </section>
        </main>

        <button class="fixed bottom-16 right-4 sm:bottom-20 sm:right-6 md:bottom-12 md:right-12 bg-background text-on-background p-4 sm:p-5 rounded-full shadow-[0_8px_30px_rgba(94,125,255,0.18)] hover:scale-110 active:scale-95 transition-all z-50 flex items-center justify-center group active-glow border border-white/10" onclick="navigateTo('create')">
            <span class="material-symbols-outlined text-2xl sm:text-3xl">add</span>
            <span class="max-w-0 overflow-hidden whitespace-nowrap group-hover:max-w-xs group-hover:ml-2 transition-all duration-300 font-label-caps text-xs">NEW EVENT</span>
        </button>

        <nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-4 bg-surface-container-low/80 backdrop-blur-xl border-t border-white/5 rounded-t-2xl">
            <button class="flex flex-col items-center justify-center text-primary bg-primary/10 rounded-full p-3 transition-all duration-150">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">timer</span>
            </button>
            <button class="flex flex-col items-center justify-center text-on-surface-variant p-3 hover:text-primary transition-colors active:scale-90">
                <span class="material-symbols-outlined">analytics</span>
            </button>
            <button class="flex flex-col items-center justify-center text-on-surface-variant p-3 hover:text-primary transition-colors active:scale-90">
                <span class="material-symbols-outlined">history</span>
            </button>
        </nav>
    </div>

    <div class="view-transition fixed inset-0 z-[60] bg-background hidden-view" id="create-view" style="display: none;">
        <header class="bg-background/80 backdrop-blur-md flex items-center w-full px-margin-mobile py-4 border-b border-white/5">
            <button class="material-symbols-outlined text-on-surface-variant hover:text-primary active:scale-90 transition-all mr-4" onclick="navigateTo('dashboard')">arrow_back</button>
            <h2 class="font-label-caps text-label-caps tracking-[0.2em] text-on-surface">NEW EVENT</h2>
        </header>
        <main class="w-full max-w-full sm:max-w-2xl mx-auto px-4 sm:px-6 pt-stack-md pb-24 flex flex-col gap-stack-md">
            <div class="flex flex-col gap-2">
                <label class="font-label-caps text-[11px] text-on-surface-variant uppercase ml-1">Event Title</label>
                <input class="bg-surface-container-highest border-none rounded-xl text-on-surface placeholder:text-on-surface-variant/40 focus:ring-1 focus:ring-primary h-14 px-5 transition-all" id="event-title-input" placeholder="Product Launch..." type="text">
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="flex flex-col gap-2">
                    <label class="font-label-caps text-[11px] text-on-surface-variant uppercase ml-1">Date</label>
                    <input class="bg-surface-container-highest border-none rounded-xl text-on-surface focus:ring-1 focus:ring-primary h-14 px-5 transition-all [color-scheme:dark]" id="event-date-input" type="date">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-label-caps text-[11px] text-on-surface-variant uppercase ml-1">Time</label>
                    <input class="bg-surface-container-highest border-none rounded-xl text-on-surface focus:ring-1 focus:ring-primary h-14 px-5 transition-all [color-scheme:dark]" id="event-time-input" type="time">
                </div>
            </div>
            <div class="flex flex-col gap-2">
                <label class="font-label-caps text-[11px] text-on-surface-variant uppercase ml-1">Description (Optional)</label>
                <textarea class="bg-surface-container-highest border-none rounded-xl text-on-surface placeholder:text-on-surface-variant/40 focus:ring-1 focus:ring-primary h-32 p-5 transition-all resize-none" id="event-desc-input" placeholder="The next evolution begins..."></textarea>
            </div>
            <button class="mt-4 w-full sm:w-auto bg-primary text-on-primary font-label-caps py-4 px-6 rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2" onclick="saveEvent()">
                <span class="material-symbols-outlined">save</span>
                SAVE EVENT
            </button>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
